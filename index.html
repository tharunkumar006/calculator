<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>

    <div class="buttons">
      <button class="btn function" onclick="clearDisplay()">C</button>
      <button class="btn function" onclick="deleteLast()">DEL</button>
      <button class="btn function" onclick="appendValue('%')">%</button>
      <button class="btn operator" onclick="appendValue('/')">/</button>

      <button class="btn" onclick="appendValue('7')">7</button>
      <button class="btn" onclick="appendValue('8')">8</button>
      <button class="btn" onclick="appendValue('9')">9</button>
      <button class="btn operator" onclick="appendValue('*')">*</button>

      <button class="btn" onclick="appendValue('4')">4</button>
      <button class="btn" onclick="appendValue('5')">5</button>
      <button class="btn" onclick="appendValue('6')">6</button>
      <button class="btn operator" onclick="appendValue('-')">-</button>

      <button class="btn" onclick="appendValue('1')">1</button>
      <button class="btn" onclick="appendValue('2')">2</button>
      <button class="btn" onclick="appendValue('3')">3</button>
      <button class="btn operator" onclick="appendValue('+')">+</button>

      <button class="btn" onclick="appendValue('.')">.</button>
      <button class="btn zero" onclick="appendValue('0')">0</button>
      <button class="btn equal" onclick="calculateResult()">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");

    function appendValue(value) {
      if (display.innerText === "0" && value !== ".") {
        display.innerText = value;
      } else {
        display.innerText += value;
      }
    }

    function clearDisplay() {
      display.innerText = "0";
    }

    function deleteLast() {
      const current = display.innerText;
      display.innerText = current.length > 1 ? current.slice(0, -1) : "0";
    }

    function calculateResult() {
      try {
        let expression = display.innerText
          .replace(/×/g, "*")
          .replace(/÷/g, "/")
          .replace(/%/g, "/100");

        const result = eval(expression);

        if (!isFinite(result) || Number.isNaN(result)) {
          throw new Error("Invalid calculation");
        }

        display.innerText = result;
      } catch (error) {
        alert("Error");
        display.innerText = "0";
      }
    }
  </script>
</body>
</html>
